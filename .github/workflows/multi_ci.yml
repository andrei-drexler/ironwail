name: CMake on multiple platforms
on: [workflow_dispatch]
jobs:
  build-win: 
    name: Build Windows Visual Studio
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        c_compiler: [cl]
    steps:
      - name: Build
        run: cmake -DCMAKE_C_COMPILE=${{ matrix.c_compiler }} -DCMKE_BUILD_TYPE=${{matrix.build_type}} -S ${{ github.workspace }} --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

